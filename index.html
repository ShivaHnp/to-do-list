<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <!-- /* navigation bar */ -->
    <header class=" py-4 header">
        <div class="container px-0 d-flex justify-content-between align-items-center">
            <div class="container-left d-flex align-items-center justify-content-center gap-2">
                <div class="logo-circle d-flex align-items-center justify-content-center">✨</div>
                <h4 class="header-title fw-bold m-0">My Todo List</h4>
            </div>
            <div class="container-right d-flex align-items-center gap-4">
                <div class="Email phone d-flex align-items-center gap-2 text-muted">
                    <span class="email-logo"><i class="bi bi-envelope"></i></span>
                    <span>shivahp75@gmail.com</span>
                </div>
                <div class="phone d-flex align-items-center gap-2 text-muted">
                    <span class="phone-logo"><i class="bi bi-telephone"></i></span>
                    <span>+39 351 930 9376</span>
                </div>
                <button class="theme-btn d-flex justify-content-center align-items-center">🌙</button>
            </div>
        </div>
    </header>
    <!-- grid system -->
    <div class="container-fluid pt-4 px-lg-5">
        <div class="row g-3 main-row">
            <aside class="col-12 col-lg-3 sidebar rounded">
                <div class="sidebar-content d-flex flex-column align-items-start justify-content-between p-3 rounded-1">
                    <h5 class="fw-bold mb-1 select-date">Select Date</h5>
                    <p class=" mb-3 text-muted  calender-placeholder"> calender placeholder</p>
                    <img src="./images/calender.png" alt="calender" class="img-fluid rounded d-block img-calender">
                </div>
                <div class="action-box d-flex flex-column gap-2 justify-content-center align-items-start mx-4 mb-4 pt-0">
                    <p class="action-box-title fw-semibold p-2 fs-3 ">Quick Actions</p>
                    <div class="action-box-day rounded-pill p-3 mb-2 shadow-sm active-day">
                        <h6 class="m-0">Yesterday</h6>
                    </div>
                    <div class="action-box-day rounded-pill p-3 mb-2 shadow-sm active-day">
                        <h6 class="m-0">Today</h6>
                    </div>
                    <div class="action-box-day rounded-pill p-3 mb-2 shadow-sm active-day">
                        <h6 class="m-0">Tommorow</h6>
                    </div>
                </div>
            </aside>
            <main class="col-12 col-lg-9">
                <div class="main-card p-4">
                    <div class="main-card-top d-flex justify-content-between align-items-center">
                        <h2 class="fw-bold mb-0">March 13, 2026</h2>
                        <span class="badge rounded-pill p-2 mb-4 fs-6">✨ You're doing great!</span>
                    </div>
                    <p class="text-muted small">1 of the 3 tasks completed</p>
                    <div class="progress mb-4">
                        <div class="progress-bar"></div>
                    </div>
                    <div class="task-filters d-flex gap-2 mb-2 main-card-category">
                        <button class="btn btn-light rounded-pill px-4">All</button>
                        <button class="btn btn-light rounded-pill px-4">Work</button>
                        <button class="btn btn-light rounded-pill px-4">Personal</button>
                        <button class="btn btn-light rounded-pill px-4">Shopping</button>
                        <button class="btn btn-light rounded-pill px-4">Health</button>
                        <button class="btn btn-light rounded-pill px-4">Others</button>
                        <button class="btn btn-light rounded-pill px-4">+</button>
                    </div>
                    <div class="add-task d-flex gap-3 mb-4">
                        <input 
                        type="text"
                        class="form-control rounded-pill task-input"
                        placeholder="Add a new task..."
                        >
                        <select name="task" id="task-selection" class="form-select rounded-pill px-4 w-auto">
                            <option value="personal">Personal</option>
                            <option value="work">Work</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                        </select>
                        <button class="btn rounded-pill px-4 add-btn">+Add</button>
                    </div>
                    <div class="task-container">
                        
                    </div>
                </div>
            </main>
            
        </div>
    </div>
        
        
        
        
        
        
        
    <script src="script.js"></script>
</body>
</html>
